description: >-
  DISH Network is a U.S. television provider offering satellite and streaming TV
  services, as well as wireless services through its Boost Mobile and DISH Wireless
  brands. DISH is now part of EchoStar following the 2024 merger that brought DISH
  and Hughes back together under one parent. No public consumer-facing developer
  APIs are documented; the Boost Mobile and DISH Wireless networks are operated
  on a 5G Open RAN architecture.
